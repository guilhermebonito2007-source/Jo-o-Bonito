<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumo da Compra</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="carrinho.css">
</head>
<body class="checkout-page">
  <header>
    <h1>Resumo da Compra</h1>
  </header>

  <main>
    <section id="checkoutSummary"></section>

    <section class="checkout-section">
      <h2>Dados do cliente</h2>
      <form id="checkoutForm" class="checkout-form">
        <div>
          <label for="fullName">Nome completo</label>
          <input id="fullName" name="fullName" type="text" required placeholder="Nome completo" />
        </div>
        <div>
          <label for="address">Morada</label>
          <input id="address" name="address" type="text" required placeholder="Rua numero, cidade" />
        </div>
        <div>
                    <label for="contact">Numero de telemóvel ou E-mail</label>
          <input id="contact" name="contact" type="text" required placeholder="Telemóvel ou E-mail" />
        </div>
        <div>
          <label for="birthDate">Data de nascimento</label>
          <input id="birthDate" name="birthDate" type="date" required />
        </div>
        <div>
          <label for="postalCode">Código postal</label>
          <input id="postalCode" name="postalCode" type="text" required placeholder="0000-000" />
          <p class="checkout-note">Por favor, insira o seu código postal para entrega.</p>
        </div>
        <fieldset class="payment-methods">
          <legend>Método de pagamento</legend>
          <label><input type="radio" id="mbwayOption" name="paymentMethod" value="mbway" required onclick="openMbwayPage()" /> MB WAY</label>
          <label><input type="radio" id="multibancoOption" name="paymentMethod" value="multibanco" onclick="openMultibancoPage()" /> Multibanco</label>
          <label><input type="radio" id="cartaoOption" name="paymentMethod" value="cartao" onclick="openCreditCardPage()" /> Cartão de crédito / débito</label>
          <label><input type="radio" id="transferenciaOption" name="paymentMethod" value="transferencia" onclick="openTransferPage()" /> Transferência bancária</label>
        </fieldset>
        <p class="checkout-note">Ao selecionar MB WAY, Multibanco, Cartão ou Transferência, abrirá uma página separada para inserir os dados do pagamento.</p>
        <button type="submit" class="checkout-button">Enviar encomenda</button>
      </form>
    </section>

  <div class="cart-actions"> 
    <a href="carrinho.html" class="cart-back">← Voltar para o carrinho</a>
  </div>
  </main>

  <script src="../cart.js"></script>
  <script>
    // Exibe o resumo de checkout e atualiza o contador do carrinho.
    renderCheckoutSummary('checkoutSummary');
    updateCartCount();

    // FunÃ§Ãµes para abrir cada tipo de pagamento numa nova aba.
    function openMbwayPage() {
      window.open('mbway.html', '_blank');
    }

    function openMultibancoPage(  ) {
      window.open('multibanco.html', '_blank');
    }

    function openCreditCardPage() {
      window.open('creditcard.html', '_blank');
    }

    function openTransferPage() {
      window.open('transferencia.html', '_blank');
    }

    const API_BASE = '/api';

    function getLoggedUserId() {
      try {
        const user = JSON.parse(localStorage.getItem('lojaUserAuth') || 'null');
        return user?.id || null;
      } catch (error) {
        return null;
      }
    }

    function buildOrderItems() {
      return Object.values(getCart()).map(item => ({
        productId: item.productId,
        quantity: item.quantity,
        price: item.price,
        selectedOptions: item.options || {}
      }));
    }

    function getCartTotal() {
      return Object.values(getCart()).reduce((sum, item) => sum + (Number(item.price) * Number(item.quantity)), 0);

    }

    // Valida o formulário de checkout e finaliza a encomenda.
    const checkoutForm = document.getElementById('checkoutForm');
    checkoutForm.addEventListener('submit', async function(event) {
      event.preventDefault();

      const fullName = document.getElementById('fullName').value.trim();
      const address = document.getElementById('address').value.trim();
      const contact = document.getElementById('contact').value.trim();
      const birthDate = document.getElementById('birthDate').value;
      const postalCode = document.getElementById('postalCode').value.trim();
      const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked');
      const cartItems = buildOrderItems();

      if (!fullName || !address || !contact || !birthDate || !postalCode) {
        alert('Preencha todos os campos antes de enviar a encomenda.');
        return;
      }

      if (!paymentMethod) {
        alert('Selecione um método de pagamento.');
        return;
      }

      if (cartItems.length === 0) {
        alert('O carrinho está vazio.');
        return;
      }

      const submitButton = checkoutForm.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.textContent = 'A enviar...';

      try {
        const totalPrice = getCartTotal();
        const orderResponse = await fetch(`${API_BASE}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: getLoggedUserId(),
            cartItems,
            totalPrice,
            paymentMethod: paymentMethod.value,
            shippingAddress: { fullName, address, contact, birthDate, postalCode },
            notes: ''
          })
        });

        const orderData = await orderResponse.json();
        if (!orderResponse.ok) {
          throw new Error(orderData.error || 'Erro ao criar encomenda');
        }

        await fetch(`${API_BASE}/payments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderId: orderData.orderId,
            amount: totalPrice,
            method: paymentMethod.value,
            reference: orderData.orderNumber
          })
        });

        alert(`Obrigado! A sua encomenda ${orderData.orderNumber} foi registada.`);
        clearCart();
        window.location.href = '../index.html';
      } catch (error) {
        console.error('Erro ao finalizar encomenda:', error);
        alert(error.message || 'Erro ao finalizar encomenda. Tente novamente.');
        submitButton.disabled = false;
        submitButton.textContent = 'Enviar encomenda';
      }
    });
  </script>
</body>
</html>
